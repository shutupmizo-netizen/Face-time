<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 PK BATTLE V9.0 LIVE</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
        body{background:#0a0e27;color:#fff;height:100vh;overflow:hidden}
  .auth-screen{position:fixed;inset:0;background:rgba(10,14,39,0.98);display:flex;align-items:center;justify-content:center;z-index:1000}
  .auth-box{background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%);padding:30px;border-radius:20px;width:90%;max-width:350px}
  .auth-title{font-size:24px;font-weight:bold;text-align:center;margin-bottom:20px}
  .auth-input{width:100%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.3);color:#fff;padding:12px;border-radius:10px;margin-bottom:12px;font-size:16px}
  .auth-btn{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);border:none;color:#fff;padding:12px;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;width:100%;margin-bottom:8px}
  .auth-toggle{text-align:center;margin-top:12px;color:#aaa;cursor:pointer;font-size:14px}
  .hidden{display:none}
  .app{height:100vh;display:flex;flex-direction:column}
  .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .logo{font-size:16px;font-weight:bold}
  .stats{display:flex;gap:6px;align-items:center}
  .stat{background:rgba(255,255,255,0.2);padding:4px 8px;border-radius:12px;font-weight:bold;font-size:11px}
  .online{background:#10b981;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
  .nav-tabs{display:flex;background:rgba(255,255,255,0.05);border-bottom:2px solid rgba(102,126,234,0.3);flex-shrink:0;overflow-x:auto}
  .nav-tab{flex:1;min-width:55px;background:none;border:none;color:#aaa;padding:10px 5px;font-weight:bold;font-size:10px;cursor:pointer;border-bottom:3px solid transparent}
  .nav-tab.active{color:#667eea;border-bottom-color:#667eea;background:rgba(102,126,234,0.1)}
  .content{flex:1;overflow-y:auto;padding:8px}
  .tab-panel{display:none;height:100%}
  .tab-panel.active{display:block}
  .video-container{position:relative;background:#000;border-radius:12px;overflow:hidden;margin-bottom:8px;height:220px}
  .video-stream{width:100%;height:100%;object-fit:cover}
  .live-badge{position:absolute;top:10px;left:10px;background:#ef4444;padding:4px 10px;border-radius:15px;font-size:11px;font-weight:bold;animation:pulse 2s infinite}
  .viewer-count{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.7);padding:4px 10px;border-radius:15px;font-size:11px}
  .video-controls{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:10px}
  .video-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:10px;border-radius:50%;width:45px;height:45px;cursor:pointer;backdrop-filter:blur(10px);font-size:18px}
  .video-btn.active{background:#ef4444}
  .live-list{max-height:150px;overflow-y:auto;margin-bottom:8px}
  .live-item{background:rgba(255,255,255,0.1);padding:8px;border-radius:8px;margin-bottom:6px;display:flex;align-items:center;gap:8px;font-size:11px}
  .live-avatar{width:35px;height:35px;border-radius:50%;border:2px solid #ef4444;object-fit:cover}
  .gift-panel{position:fixed;bottom:70px;left:10px;right:10px;background:rgba(0,0,0,0.9);padding:12px;border-radius:15px;z-index:999;display:none;grid-template-columns:repeat(3,1fr);gap:8px}
  .gift-btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border:none;color:#fff;padding:12px;border-radius:10px;font-weight:bold;cursor:pointer;font-size:11px}
  .battle-compact{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;margin-bottom:8px}
  .player-mini{background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%);padding:10px;border-radius:10px;text-align:center}
  .player-name-mini{font-size:11px;font-weight:bold;margin-bottom:3px}
  .votes-mini{font-size:20px;font-weight:bold;color:#ffd700}
  .vote-btn-mini{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);border:none;color:#fff;padding:6px;border-radius:6px;font-size:10px;font-weight:bold;cursor:pointer;width:100%;margin-top:4px}
  .vs-mini{font-size:16px;font-weight:bold;color:#667eea;align-self:center}
  .games-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
  .game-btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border:none;color:#fff;padding:8px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:10px}
  .chat-compact{background:rgba(255,255,255,0.05);border-radius:8px;padding:6px;height:calc(100% - 10px);display:flex;flex-direction:column}
  .chat-msgs{flex:1;overflow-y:auto;margin-bottom:6px;padding:4px;font-size:11px}
  .chat-msg{padding:5px;background:rgba(255,255,255,0.1);border-radius:5px;margin-bottom:4px}
  .chat-user{font-weight:bold;color:#667eea;font-size:9px}
  .chat-input-row{display:flex;gap:4px}
  .chat-input{flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(102,126,234,0.5);color:#fff;padding:8px;border-radius:8px;font-size:12px}
  .send-btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border:none;color:#fff;padding:8px 12px;border-radius:8px;font-weight:bold;cursor:pointer;font-size:11px}
  .profile-compact{background:rgba(255,255,255,0.05);border-radius:10px;padding:12px;margin-bottom:10px}
  .profile-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .profile-pic-sm{width:50px;height:50px;border-radius:50%;border:2px solid #667eea;object-fit:cover}
  .profile-stats-row{display:flex;justify-content:space-around;text-align:center}
  .profile-stat-num{font-size:18px;font-weight:bold;color:#667eea}
  .profile-stat-label{font-size:9px;color:#aaa}
  .party-room-sm{background:rgba(255,255,255,0.1);padding:10px;border-radius:8px;margin-bottom:8px;font-size:11px}
  .leaderboard-item-sm{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(255,255,255,0.1);border-radius:8px;margin-bottom:6px;font-size:11px}
  .leaderboard-rank{font-size:16px;font-weight:bold;color:#ffd700;width:20px}
  .leaderboard-pic{width:30px;height:30px;border-radius:50%;object-fit:cover}
  .notification{position:fixed;top:60px;right:10px;background:linear-gradient(135deg,#10b981 0%,#059669 100%);padding:10px 15px;border-radius:8px;box-shadow:0 5px 15px rgba(16,185,129,0.4);z-index:2000;font-size:12px;animation:slideIn 0.3s}
        @keyframes slideIn{from{transform:translateX(300px)}to{transform:translateX(0)}}
  .notification.error{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%)}
  .gift-animation{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px;animation:giftFly 2s;z-index:3000;pointer-events:none}
        @keyframes giftFly{0%{transform:translate(-50%,100px);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translate(-50%,-200px);opacity:0}}
    </style>
</head>
<body>
    <div class="auth-screen" id="authScreen">
        <div class="auth-box">
            <div class="auth-title">🔥 PK BATTLE V9.0 LIVE</div>
            <input type="text" class="auth-input" id="authUsername" placeholder="Username">
            <input type="password" class="auth-input" id="authPassword" placeholder="Password">
            <button class="auth-btn" id="authBtn">LOGIN</button>
            <div class="auth-toggle" id="authToggle">Don't have account? Sign up</div>
            <div id="authError" style="color:#ef4444;text-align:center;margin-top:8px;font-size:12px"></div>
        </div>
    </div>

    <div class="app hidden" id="mainApp">
        <div class="header">
            <div class="logo">🔥 PK BATTLE LIVE</div>
            <div class="stats">
                <div class="stat online">🟢 <span id="onlineCount">0</span></div>
                <div class="stat">💰 <span id="userCoins">0</span></div>
                <div class="stat">⭐ <span id="userPoints">0</span></div>
                <div class="stat" id="userName" onclick="showTabDirect('profile')">👤</div>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('live')">📹 Live</button>
            <button class="nav-tab" onclick="showTab('battle')">⚔️ Battle</button>
            <button class="nav-tab" onclick="showTab('games')">🎮 Games</button>
            <button class="nav-tab" onclick="showTab('party')">🎉 Party</button>
            <button class="nav-tab" onclick="showTab('chat')">💬 Chat</button>
            <button class="nav-tab" onclick="showTab('rank')">🏆 Rank</button>
        </div>

        <div class="content">
            <div class="tab-panel active" id="liveTab">
                <div class="video-container">
                    <video id="localVideo" class="video-stream hidden" autoplay muted playsinline></video>
                    <video id="remoteVideo" class="video-stream hidden" autoplay playsinline></video>
                    <div id="videoPlaceholder" style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:10px">
                        <div style="font-size:40px">📹</div>
                        <div style="font-size:12px;color:#aaa">Go Live or Join Stream</div>
                    </div>
                    <div class="live-badge hidden" id="liveBadge">🔴 LIVE</div>
                    <div class="viewer-count hidden" id="viewerCount">👀 0</div>
                    <div class="video-controls">
                        <button class="video-btn" id="goLiveBtn" onclick="toggleLive()">📹</button>
                        <button class="video-btn hidden" id="giftBtn" onclick="toggleGiftPanel()">🎁</button>
                        <button class="video-btn hidden" id="leaveLiveBtn" onclick="leaveLive()">❌</button>
                    </div>
                </div>
                <div class="live-list" id="liveList"></div>
            </div>

            <div class="gift-panel" id="giftPanel">
                <button class="gift-btn" onclick="sendGift('rose', 10)">🌹 Rose<br>10 Coins</button>
                <button class="gift-btn" onclick="sendGift('diamond', 100)">💎 Diamond<br>100 Coins</button>
                <button class="gift-btn" onclick="sendGift('crown', 500)">👑 Crown<br>500 Coins</button>
            </div>

            <div class="tab-panel" id="battleTab">
                <div class="battle-compact">
                    <div class="player-mini">
                        <div class="player-name-mini">👑 BOSS</div>
                        <div class="votes-mini" id="bossVotes">0</div>
                        <button class="vote-btn-mini" onclick="vote('boss')">🔥 VOTE (10)</button>
                    </div>
                    <div class="vs-mini">VS</div>
                    <div class="player-mini">
                        <div class="player-name-mini">😈 ENEMY</div>
                        <div class="votes-mini" id="enemyVotes">0</div>
                        <button class="vote-btn-mini" onclick="vote('enemy')">⚡ VOTE (10)</button>
                    </div>
                <button class="game-btn" style="width:100%" onclick="claimFreeCoins()">🎁 CLAIM 500 FREE COINS</button>
            </div>

            <div class="tab-panel" id="gamesTab">
                <div class="games-grid">
                    <button class="game-btn" onclick="spinWheel()">🎡 SPIN (20)</button>
                    <button class="game-btn" onclick="coinFlip()">🪙 FLIP (10)</button>
                    <button class="game-btn" onclick="luckyBox()">🎁 BOX (30)</button>
                    <button class="game-btn" onclick="numberGuess()">🎯 GUESS (15)</button>
                </div>
                <div class="profile-compact">
                    <div class="profile-row">
                        <img src="https://i.imgur.com/8Km9tLL.png" class="profile-pic-sm" id="myProfilePic">
                        <div style="flex:1">
                            <div style="font-weight:bold;font-size:14px" id="myProfileName">Guest</div>
                            <div style="font-size:10px;color:#aaa" id="myProfileBio">PK Battle Player</div>
                        </div>
                        <button class="game-btn" style="padding:6px 10px" onclick="showEditProfile()">✏️</button>
                    </div>
                    <div class="profile-stats-row">
                        <div><div class="profile-stat-num" id="myFollowers">0</div><div class="profile-stat-label">Followers</div></div>
                        <div><div class="profile-stat-num" id="myFollowing">0</div><div class="profile-stat-label">Following</div></div>
                        <div><div class="profile-stat-num" id="myPointsDisplay">0</div><div class="profile-stat-label">Points</div></div>
                        <div><div class="profile-stat-num" id="myGifts">0</div><div class="profile-stat-label">Gifts</div></div>
                    </div>
                </div>
            </div>

            <div class="tab-panel" id="partyTab">
                <button class="game-btn" style="width:100%;margin-bottom:10px" onclick="createParty()">➕ Create Party Room</button>
                <div id="partyRoomsList"></div>
            </div>

            <div class="tab-panel" id="chatTab">
                <div class="chat-compact">
                    <div class="chat-msgs" id="chatMessages"></div>
                    <div class="chat-input-row">
                        <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
                        <button class="send-btn" onclick="sendChat()">Send</button>
                    </div>
                </div>
            </div>

            <div class="tab-panel" id="rankTab">
                <div style="display:flex;gap:8px;margin-bottom:10px">
                    <button class="game-btn" style="flex:1" onclick="switchRank('points')">⭐ Points</button>
                    <button class="game-btn" style="flex:1" onclick="switchRank('coins')">💰 Coins</button>
                </div>
                <div id="pointsRank"></div>
                <div id="coinsRank" class="hidden"></div>
            </div>

            <div class="tab-panel" id="profileTab">
                <div class="profile-compact">
                    <div style="text-align:center;margin-bottom:15px">
                        <img src="https://i.imgur.com/8Km9tLL.png" style="width:80px;height:80px;border-radius:50%;border:3px solid #667eea" id="profileViewPic">
                        <div style="font-size:18px;font-weight:bold;margin-top:8px" id="profileViewName">Guest</div>
                        <div style="font-size:11px;color:#aaa;margin-top:4px" id="profileViewBio">PK Battle Player</div>
                    </div>
                    <div class="profile-stats-row" style="margin-bottom:15px">
                        <div><div class="profile-stat-num" id="profileViewFollowers">0</div><div class="profile-stat-label">Followers</div></div>
                        <div><div class="profile-stat-num" id="profileViewFollowing">0</div><div class="profile-stat-label">Following</div></div>
                        <div><div class="profile-stat-num" id="profileViewPoints">0</div><div class="profile-stat-label">Points</div></div>
                        <div><div class="profile-stat-num" id="profileViewGifts">0</div><div class="profile-stat-label">Gifts</div></div>
                    </div>
                    <button class="game-btn" style="width:100%" id="followBtn" onclick="toggleFollow()">Follow</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentUser = null;
        let currentProfile = null;
        let sessionId = localStorage.getItem('sessionId');
        let currentViewProfile = null;
        let localStream = null;
        let peerConnections = {};
        let isLive = false;
        let currentLiveStreamer = null;

        if(sessionId) socket.emit('verify_session', {session_id: sessionId});

        socket.on('auth_success', (data) => {
            currentUser = data.username;
            currentProfile = data.profile;
            sessionId = data.session_id;
            localStorage.setItem('sessionId', sessionId);
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            updateUserInfo(data);
            showNotification('✅ Login Success!');
            socket.emit('get_party_rooms');
            socket.emit('get_leaderboard', {});
        });

        socket.on('auth_error', (data) => {
            document.getElementById('authError').textContent = data.msg;
        });

        socket.on('online_update', (data) => {
            document.getElementById('onlineCount').textContent = data.count;
        });

        socket.on('vote_update', (data) => {
            document.getElementById('bossVotes').textContent = data.boss;
            document.getElementById('enemyVotes').textContent = data.enemy;
        });

        socket.on('coins_update', (data) => {
            document.getElementById('userCoins').textContent = data.coins;
            document.getElementById('userPoints').textContent = data.points;
            document.getElementById('myPointsDisplay').textContent = data.points;
            if(currentProfile){
                currentProfile.coins = data.coins;
                currentProfile.points = data.points;
            }
        });

        socket.on('live_update', (data) => {
            updateLiveList();
            if(data.status === 'live' && data.username === currentUser){
                document.getElementById('liveBadge').classList.remove('hidden');
                document.getElementById('viewerCount').classList.remove('hidden');
                document.getElementById('giftBtn').classList.remove('hidden');
                document.getElementById('leaveLiveBtn').classList.remove('hidden');
            }else if(data.status === 'offline' && data.username === currentUser){
                stopLive();
            }
        });

        socket.on('live_viewer_count', (data) => {
            if(data.username === currentUser || data.username === currentLiveStreamer){
                document.getElementById('viewerCount').textContent = `👀 ${data.viewers}`;
            }
        });

        socket.on('live_streamers_list', (data) => {
            renderLiveList(data);
        });

        socket.on('live_started', (data) => {
            showNotification(`🔴 ${data.username} is LIVE!`);
        });

        socket.on('webrtc_offer', async (data) => {
            if(!peerConnections[data.from]){
                peerConnections[data.from] = createPeerConnection(data.from);
            }
            await peerConnections[data.from].setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await peerConnections[data.from].createAnswer();
            await peerConnections[data.from].setLocalDescription(answer);
            socket.emit('webrtc_answer', {to: data.from, answer: answer});
        });

        socket.on('webrtc_answer', async (data) => {
            if(peerConnections[data.from]){
                await peerConnections[data.from].setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });

        socket.on('webrtc_ice_candidate', async (data) => {
            if(peerConnections[data.from]){
                await peerConnections[data.from].addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        socket.on('gift_sent', (data) => {
            showGiftAnimation(data.gift_type);
            showNotification(`${data.sender} sent ${data.gift_type} to ${data.receiver}!`);
        });

        socket.on('gift_error', (data) => {
            showNotification(data.msg, true);
        });

        socket.on('chat_message', (data) => {
            const chatMessages = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-msg';
            msgDiv.innerHTML = `<div class="chat-user">${data.username}</div><div>${data.msg}</div>`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        socket.on('game_result', (data) => {
            showNotification(data.msg,!data.success);
            if(data.success && data.new_coins!== undefined){
                document.getElementById('userCoins').textContent = data.new_coins;
                document.getElementById('userPoints').textContent = data.new_points;
                document.getElementById('myPointsDisplay').textContent = data.new_points;
            }
        });

        socket.on('profile_data', (data) => {
            currentViewProfile = data.username;
            document.getElementById('profileViewPic').src = data.profile_pic;
            document.getElementById('profileViewName').textContent = data.username;
            document.getElementById('profileViewBio').textContent = data.bio;
            document.getElementById('profileViewFollowers').textContent = data.followers;
            document.getElementById('profileViewFollowing').textContent = data.following;
            document.getElementById('profileViewPoints').textContent = data.points;
            document.getElementById('profileViewGifts').textContent = data.total_gifts;
            const followBtn = document.getElementById('followBtn');
            if(data.is_self){
                followBtn.textContent = '✏️ Edit Profile';
                followBtn.onclick = showEditProfile;
            }else{
                followBtn.textContent = data.is_following? '✓ Following' : 'Follow';
                followBtn.onclick = () => toggleFollow(data.username);
            }
            showTabDirect('profile');
        });

        socket.on('party_rooms_list', (data) => {
            renderPartyRooms(data);
        });

        socket.on('party_created', (data) => {
            showNotification(`🎉 Party "${data.room_name}" created!`);
            socket.emit('get_party_rooms');
        });

        socket.on('party_update', (data) => {
            socket.emit('get_party_rooms');
        });

        socket.on('party_ended', (data) => {
            showNotification(data.msg);
            socket.emit('get_party_rooms');
        });

        socket.on('party_error', (data) => {
            showNotification(data.msg, true);
        });

        socket.on('party_notification', (data) => {
            showNotification(data.msg);
        });

        socket.on('leaderboard_data', (data) => {
            renderLeaderboard(data);
        });

        function updateUserInfo(data){
            document.getElementById('userName').textContent = '👤 ' + data.username;
            document.getElementById('userCoins').textContent = data.coins;
            document.getElementById('userPoints').textContent = data.profile.points;
            document.getElementById('myProfileName').textContent = data.username;
            document.getElementById('myProfileBio').textContent = data.profile.bio;
            document.getElementById('myProfilePic').src = data.profile.profile_pic;
            document.getElementById('myFollowers').textContent = data.profile.followers;
            document.getElementById('myFollowing').textContent = data.profile.following;
            document.getElementById('myPointsDisplay').textContent = data.profile.points;
            document.getElementById('myGifts').textContent = data.profile.total_gifts;
        }

        function showNotification(msg, isError=false){
            const notif = document.createElement('div');
            notif.className = 'notification' + (isError? ' error' : '');
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        function showGiftAnimation(giftType){
            const emojis = {rose: '🌹', diamond: '💎', crown: '👑'};
            const emoji = emojis[giftType] || '🎁';
            const anim = document.createElement('div');
            anim.className = 'gift-animation';
            anim.textContent = emoji;
            document.body.appendChild(anim);
            setTimeout(() => anim.remove(), 2000);
        }

        document.getElementById('authBtn').onclick = () => {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            const isSignup = document.getElementById('authBtn').textContent === 'SIGN UP';
            socket.emit(isSignup? 'signup' : 'login', {username, password});
        };

        document.getElementById('authToggle').onclick = () => {
            const btn = document.getElementById('authBtn');
            const toggle = document.getElementById('authToggle');
            if(btn.textContent === 'LOGIN'){
                btn.textContent = 'SIGN UP';
                toggle.textContent = 'Already have account? Login';
            }else{
                btn.textContent = 'LOGIN';
                toggle.textContent = "Don't have account? Sign up";
            }
        };

        function showTab(tab){
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        function showTabDirect(tab){
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(t => {
                if(t.onclick.toString().includes(tab)) t.classList.add('active');
            });
        }

        async function toggleLive(){
            if(isLive){
                stopLive();
            }else{
                try{
                    localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                    document.getElementById('localVideo').srcObject = localStream;
                    document.getElementById('localVideo').classList.remove('hidden');
                    document.getElementById('videoPlaceholder').classList.add('hidden');
                    document.getElementById('goLiveBtn').classList.add('active');
                    isLive = true;
                    socket.emit('go_live', {username: currentUser});
                    showNotification('🔴 You are LIVE!');
                }catch(err){
                    showNotification('Camera/Mic access denied!', true);
                }
            }
        }

        function stopLive(){
            if(localStream){
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            Object.keys(peerConnections).forEach(peer => peerConnections.close());
            peerConnections = {};
            document.getElementById('localVideo').classList.add('hidden');
            document.getElementById('remoteVideo').classList.add('hidden');
            document.getElementById('videoPlaceholder').classList.remove('hidden');
            document.getElementById('goLiveBtn').classList.remove('active');
            document.getElementById('liveBadge').classList.add('hidden');
            document.getElementById('viewerCount').classList.add('hidden');
            document.getElementById('giftBtn').classList.add('hidden');
            document.getElementById('leaveLiveBtn').classList.add('hidden');
            isLive = false;
            socket.emit('stop_live', {username: currentUser});
        }

        function leaveLive(){
            if(currentLiveStreamer){
                socket.emit('leave_live', {streamer: currentLiveStreamer});
                document.getElementById('remoteVideo').classList.add('hidden');
                document.getElementById('videoPlaceholder').classList.remove('hidden');
                document.getElementById('giftBtn').classList.add('hidden');
                document.getElementById('leaveLiveBtn').classList.add('hidden');
                currentLiveStreamer = null;
            }
        }

        function createPeerConnection(peerId){
            const pc = new RTCPeerConnection({
                iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
            });

            pc.onicecandidate = (event) => {
                if(event.candidate){
                    socket.emit('webrtc_ice_candidate', {to: peerId, candidate: event.candidate});
                }
            };

            pc.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
                document.getElementById('remoteVideo').classList.remove('hidden');
                document.getElementById('videoPlaceholder').classList.add('hidden');
            };

            if(localStream){
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }

            return pc;
        }

        async function joinLiveStream(streamer){
            currentLiveStreamer = streamer;
            document.getElementById('videoPlaceholder').classList.add('hidden');
            document.getElementById('remoteVideo').classList.remove('hidden');
            document.getElementById('giftBtn').classList.remove('hidden');
            document.getElementById('leaveLiveBtn').classList.remove('hidden');
            socket.emit('join_live', {username: currentUser, streamer: streamer});

            peerConnections[streamer] = createPeerConnection(streamer);
            const offer = await peerConnections[streamer].createOffer();
            await peerConnections[streamer].setLocalDescription(offer);
            socket.emit('webrtc_offer', {to: streamer, offer: offer, from: currentUser});
        }

        function updateLiveList(){
            socket.emit('connect');
        }

        function renderLiveList(data){
            const list = document.getElementById('liveList');
            if(!data || data.length === 0){
                list.innerHTML = '<div style="text-align:center;color:#aaa;padding:20px;font-size:11px">No one is live yet</div>';
                return;
            }
            list.innerHTML = data.map(stream => `
                <div class="live-item">
                    <img src="https://i.imgur.com/8Km9tLL.png" class="live-avatar">
                    <div style="flex:1">
                        <div style="font-weight:bold">${stream.username}</div>
                        <div style="font-size:9px;color:#aaa">👀 ${stream.viewers} viewers</div>
                    </div>
                    <button class="game-btn" style="padding:6px 12px" onclick="joinLiveStream('${stream.username}')">Join</button>
                </div>
            `).join('');
        }

        function toggleGiftPanel(){
            const panel = document.getElementById('giftPanel');
            panel.style.display = panel.style.display === 'none'? 'grid' : 'none';
        }

        function sendGift(giftType, coins){
            const target = isLive? currentUser : currentLiveStreamer;
            if(!target) return;
            socket.emit('send_gift', {sender: currentUser, receiver: target, gift_type: giftType, coins: coins});
            toggleGiftPanel();
        }

        function vote(side){
            socket.emit('vote', {side, username: currentUser});
        }

        function sendChat(){
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if(msg && currentUser){
                socket.emit('send_chat', {username: currentUser, msg, profile_pic: currentProfile?.profile_pic});
                input.value = '';
            }
        }

        function claimFreeCoins(){
            socket.emit('get_free_coins', {username: currentUser});
        }

        function spinWheel(){
            socket.emit('spin_wheel', {username: currentUser});
        }

        function coinFlip(){
            const choice = confirm('Choose HEADS? Cancel for TAILS')? 'heads' : 'tails';
            socket.emit('coin_flip', {username: currentUser, choice});
        }

        function luckyBox(){
            socket.emit('lucky_box', {username: currentUser});
        }

        function numberGuess(){
            const guess = prompt('Guess number 1-10:');
            if(guess &&!isNaN(guess) && guess >= 1 && guess <= 10){
                socket.emit('number_guess', {username: currentUser, guess: parseInt(guess)});
            }
        }

                function createParty(){
            const name = prompt('Party Room Name:');
            if(name && name.trim()){
                socket.emit('create_party', {username: currentUser, room_name: name.trim()});
            }
        }

        function renderPartyRooms(data){
            const list = document.getElementById('partyRoomsList');
            if(!data || data.length === 0){
                list.innerHTML = '<div style="text-align:center;color:#aaa;padding:20px;font-size:11px">No party rooms yet</div>';
                return;
            }
            list.innerHTML = data.map(room => `
                <div class="party-room-sm">
                    <div class="party-name">🎉 ${room.room_name}</div>
                    <div style="display:flex;justify-content:space-between;margin-top:6px">
                        <div>👑 ${room.crown}</div>
                        <div>👥 ${room.members.length}/10</div>
                    </div>
                    <button class="game-btn" style="width:100%;margin-top:8px;padding:6px" onclick="joinParty('${room.id}')">Join Party</button>
                </div>
            `).join('');
        }

        function joinParty(roomId){
            socket.emit('join_party', {username: currentUser, room_id: roomId});
        }

        function renderLeaderboard(data){
            const pointsDiv = document.getElementById('pointsRank');
            const coinsDiv = document.getElementById('coinsRank');
            
            pointsDiv.innerHTML = data.points.map((user, idx) => `
                <div class="leaderboard-item-sm">
                    <div class="leaderboard-rank">${idx+1}</div>
                    <img src="${user.profile_pic}" class="leaderboard-pic">
                    <div style="flex:1">
                        <div style="font-weight:bold">${user.username}</div>
                        <div style="font-size:9px;color:#aaa">⭐ ${user.points} points</div>
                    </div>
                    <button class="game-btn" style="padding:4px 8px;font-size:9px" onclick="socket.emit('get_profile',{username:'${user.username}',requester:currentUser})">View</button>
                </div>
            `).join('');

            coinsDiv.innerHTML = data.coins.map((user, idx) => `
                <div class="leaderboard-item-sm">
                    <div class="leaderboard-rank">${idx+1}</div>
                    <img src="${user.profile_pic}" class="leaderboard-pic">
                    <div style="flex:1">
                        <div style="font-weight:bold">${user.username}</div>
                        <div style="font-size:9px;color:#aaa">💰 ${user.coins} coins</div>
                    </div>
                    <button class="game-btn" style="padding:4px 8px;font-size:9px" onclick="socket.emit('get_profile',{username:'${user.username}',requester:currentUser})">View</button>
                </div>
            `).join('');
        }

        function switchRank(type){
            if(type === 'points'){
                document.getElementById('pointsRank').classList.remove('hidden');
                document.getElementById('coinsRank').classList.add('hidden');
            }else{
                document.getElementById('pointsRank').classList.add('hidden');
                document.getElementById('coinsRank').classList.remove('hidden');
            }
        }

        function toggleFollow(username){
            socket.emit('follow_user', {follower: currentUser, following: username || currentViewProfile});
        }

        function showEditProfile(){
            const newBio = prompt('Enter new bio:', currentProfile.bio);
            if(newBio !== null){
                socket.emit('update_profile', {username: currentUser, bio: newBio});
            }
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendChat();
        });

        setInterval(() => {
            if(currentUser) socket.emit('get_party_rooms');
        }, 10000);

        socket.emit('get_leaderboard', {});

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 PK BATTLE V9.0 LIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);

        }
       .login-container {
            display: flex; justify-content: center; align-items: center;

       .login-box {

       .login-box h1 { text-align: center; margin-bottom: 20px; font-size: 26px; }

        }
       .login-box input::placeholder { color: #aaa; }
       .form-row { display: flex; gap: 10px; }
       .form-row.form-group { flex: 1; }
       .btn {
            width: 100%; padding: 13px; margin: 8px 0; border: none;
            border-radius: 10px; font-size: 15px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
       .btn-login { background: linear-gradient(45deg, #ff6b6b, #ee5a24); color: white; }
       .btn-signup { background: linear-gradient(45deg, #00d2d3, #54a0ff); color: white; }
       .btn-google { background: #fff; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; }
       .btn-facebook { background: #1877f2; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
       .divider { text-align: center; margin: 15px 0; color: #ccc; font-size: 14px; }
       .forgot { text-align: center; margin-top: 10px; }
       .forgot a { color: #00d2d3; cursor: pointer; text-decoration: none; font-size: 14px; }
       .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
       .modal-content { background: #1e3c72; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
       .modal-content h2 { margin-bottom: 15px; text-align: center; }

       .tab.active { background: #ff6b6b; }
       .content { padding: 20px; }

       .profile-box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; margin: 10px 0; }

</head>
<body>
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h1>🔥 PK BATTLE V9.0 LIVE</h1>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn btn-login" onclick="login()">🚀 LOGIN</button>

            <div class="divider">— OR —</div>

            <button class="btn btn-google" onclick="window.location='/oauth/google'">
                <img src="https://www.google.com/favicon.ico" width="18"> Continue with Google
            </button>
            <button class="btn btn-facebook" onclick="window.location='/oauth/facebook'">
                <img src="https://www.facebook.com/favicon.ico" width="18"> Continue with Facebook
            </button>

            <button class="btn btn-signup" onclick="showSignup()">📝 SIGN UP FREE</button>
            <div class="forgot"><a onclick="showReset()">Forgot Password?</a></div>
        </div>
    </div>

    <!-- Signup Modal KIM -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <h2>📝 Create Account</h2>

            <div class="form-group">
                <label>Username *</label>
                <input type="text" id="newUser" placeholder="thlan tur">
            </div>

            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="newPass" placeholder="••••••••">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="newEmail" placeholder="example@gmail.com">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="newPhone" placeholder="9876543210">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="newDob">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="newGender">
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Security Question *</label>
                <select id="secQ">
                    <option>Your first pet name?</option>
                    <option>Your birth city?</option>
                    <option>Your favorite color?</option>
                    <option>Your mother's maiden name?</option>
                </select>
            </div>

            <div class="form-group">
                <label>Security Answer *</label>
                <input type="text" id="secA" placeholder="Chhanna">
            </div>

            <button class="btn btn-signup" onclick="signup()">Create Account</button>
            <button class="btn" onclick="closeModal('signupModal')" style="background:#666;">Cancel</button>
        </div>
    </div>

    <!-- Reset Modal -->
    <div id="resetModal" class="modal">
        <div class="modal-content">
            <h2>🔑 Reset Password</h2>
            <div id="resetStep1">
                <input type="text" id="resetUser" placeholder="Username">
                <button class="btn btn-login" onclick="getSecurityQ()">Next</button>
            </div>
            <div id="resetStep2" class="hidden">
                <p id="secQDisplay" style="margin:10px 0; color:#00d2d3;"></p>
                <input type="text" id="resetAnswer" placeholder="Your Answer">
                <input type="password" id="resetNewPass" placeholder="New Password">
                <button class="btn btn-login" onclick="resetPass()">Reset Password</button>
            </div>
            <button class="btn" onclick="closeModal('resetModal')" style="background:#666;">Cancel</button>
        </div>
    </div>

    <div id="mainApp" class="main-app">
        <div class="header">
            <h2>🔥 PK BATTLE V9.0 LIVE 🔥</h2>
            <p>Welcome, <span id="userDisplay"></span>!</p>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="showTab('live')">📹 Live</div>
            <div class="tab" onclick="showTab('battle')">⚔️ Battle</div>
            <div class="tab" onclick="showTab('profile')">👤 Profile</div>
            <div class="tab" onclick="showTab('chat')">💬 Chat</div>
        </div>
        <div class="content">
            <div id="liveTab" class="tab-content">
                <h3>📹 Live Camera</h3>
                <p>Camera feature coming soon!</p>
            </div>
            <div id="battleTab" class="tab-content hidden">
                <h3>⚔️ Battle Arena</h3>
                <p>Battle mode active! Challenge friends.</p>
            </div>
            <div id="profileTab" class="tab-content hidden">
                <h3>👤 Your Profile</h3>
                <div class="profile-box" id="profileData"></div>
            </div>
            <div id="chatTab" class="tab-content hidden">
                <h3>💬 Global Chat</h3>
                <p>Chat coming soon!</p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('oauth')) {
            document.getElementById('userDisplay').textContent = urlParams.get('user');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        }

        async function login() {
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('userDisplay').textContent = data.username;
                document.getElementById('profileData').innerHTML = `
                    <p><strong>Username:</strong> ${data.username}</p>
                    <p><strong>Email:</strong> ${data.email || 'Not set'}</p>
                    <p><strong>Phone:</strong> ${data.phone || 'Not set'}</p>
                    <p><strong>DOB:</strong> ${data.dob || 'Not set'}</p>
                    <p><strong>Gender:</strong> ${data.gender || 'Not set'}</p>
                `;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            } else alert(data.msg);
        }

        function showSignup() { document.getElementById('signupModal').style.display = 'flex'; }
        function showReset() { document.getElementById('resetModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function signup() {
            const res = await fetch('/signup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('newUser').value,
                    email: document.getElementById('newEmail').value,
                    phone: document.getElementById('newPhone').value,
                    dob: document.getElementById('newDob').value,
                    gender: document.getElementById('newGender').value,
                    password: document.getElementById('newPass').value,
                    security_q: document.getElementById('secQ').value,
                    security_a: document.getElementById('secA').value
                })
            });
            const data = await res.json();
            alert(data.msg);
            if(data.success) closeModal('signupModal');
        }

        async function getSecurityQ() {
            const res = await fetch('/reset_request', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: document.getElementById('resetUser').value})
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('secQDisplay').textContent = data.security_q;
                document.getElementById('resetStep1').classList.add('hidden');
                document.getElementById('resetStep2').classList.remove('hidden');
            } else alert(data.msg);
        }

        async function resetPass() {
            const res = await fetch('/reset_password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('resetUser').value,
                    answer: document.getElementById('resetAnswer').value,
                    new_password: document.getElementById('resetNewPass').value
                })
            });
            const data = await res.json();
            alert(data.msg);
            if(data.success) closeModal('resetModal');
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.remove('hidden');
            event.target.classList.add('active');
        }
    </script>
</body>
